<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Om Abhale, Data Analyst">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#131a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#13314f"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" rx="18" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.55">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
  </g>

  <!-- accent top strip -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- LEFT TEXT BLOCK -->
  <text x="70" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#22d3ee" letter-spacing="5">DATA ANALYST</text>
  <text x="66" y="188" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="66" font-weight="800" fill="#f1f5f9">Om Abhale</text>
  <text x="70" y="230" font-family="Consolas, Menlo, monospace" font-size="17" fill="#94a3b8">SQL &#183; Python &#183; Power BI &#183; Tableau &#183; Advanced Excel</text>

  <!-- chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <rect x="70" y="262" width="210" height="36" rx="18" fill="#0e1626" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="92" y="285" fill="#e2e8f0">MSc &#183; Distinction</text>

    <rect x="296" y="262" width="252" height="36" rx="18" fill="#0e1626" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="318" y="285" fill="#e2e8f0">500K+ records analysed</text>

    <rect x="564" y="262" width="190" height="36" rx="18" fill="#0e1626" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="586" y="285" fill="#e2e8f0">Fintech analytics</text>
  </g>

  <!-- RIGHT DASHBOARD CARD -->
  <rect x="840" y="64" width="376" height="232" rx="14" fill="#0e1626" stroke="#1f2a44" stroke-width="1.5"/>
  <text x="866" y="100" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#cbd5e1">Monthly KPI trend</text>
  <text x="1130" y="100" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#22d3ee">&#9650; 24%</text>

  <!-- card gridlines -->
  <g stroke="#1f2a44" stroke-width="1">
    <line x1="866" y1="130" x2="1190" y2="130"/>
    <line x1="866" y1="170" x2="1190" y2="170"/>
    <line x1="866" y1="210" x2="1190" y2="210"/>
    <line x1="866" y1="250" x2="1190" y2="250"/>
  </g>

  <!-- bars -->
  <g fill="url(#bar)">
    <rect x="872"  y="195" width="34" height="55"  rx="4"/>
    <rect x="926"  y="172" width="34" height="78"  rx="4"/>
    <rect x="980"  y="180" width="34" height="70"  rx="4"/>
    <rect x="1034" y="145" width="34" height="105" rx="4"/>
    <rect x="1088" y="120" width="34" height="130" rx="4"/>
    <rect x="1142" y="88"  width="34" height="162" rx="4"/>
  </g>

  <!-- trend line -->
  <polyline points="889,183 943,160 997,168 1051,133 1105,108 1159,76"
            fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#22d3ee">
    <circle cx="889" cy="183" r="4"/>
    <circle cx="943" cy="160" r="4"/>
    <circle cx="997" cy="168" r="4"/>
    <circle cx="1051" cy="133" r="4"/>
    <circle cx="1105" cy="108" r="4"/>
    <circle cx="1159" cy="76" r="4"/>
  </g>
</svg>
